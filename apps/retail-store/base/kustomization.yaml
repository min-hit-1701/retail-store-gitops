apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ui.yaml
  - cart.yaml
  - orders.yaml
  - catalog.yaml
  - checkout.yaml

images:
  - name: ui
    newName: <AWS_ACCOUNT_ID>.dkr.ecr.<AWS_REGION>.amazonaws.com/uit-devsecops-dev-ui
    newTag: latest
  - name: cart
    newName: <AWS_ACCOUNT_ID>.dkr.ecr.<AWS_REGION>.amazonaws.com/uit-devsecops-dev-cart
    newTag: latest
  - name: orders
    newName: <AWS_ACCOUNT_ID>.dkr.ecr.<AWS_REGION>.amazonaws.com/uit-devsecops-dev-orders
    newTag: latest
  - name: catalog
    newName: <AWS_ACCOUNT_ID>.dkr.ecr.<AWS_REGION>.amazonaws.com/uit-devsecops-dev-catalog
    newTag: latest
  - name: checkout
    newName: <AWS_ACCOUNT_ID>.dkr.ecr.<AWS_REGION>.amazonaws.com/uit-devsecops-dev-checkout
    newTag: latest

labels:
  - pairs:
      app.kubernetes.io/managed-by: argocd
      app.kubernetes.io/part-of: retail-store
