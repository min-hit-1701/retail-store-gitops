apiVersion: v2
name: retail-store
description: Umbrella Helm chart for Retail Store microservices
type: application
version: 1.0.0
appVersion: "1.0.0"

dependencies:
  - name: ui
    version: ">=0.0.0"
    repository: "file://../../../../../02-repos/app-repo/src/ui/chart"
    condition: services.ui.enabled

  - name: cart
    version: ">=0.0.0"
    repository: "file://../../../../../02-repos/app-repo/src/cart/chart"
    condition: services.cart.enabled

  - name: orders
    version: ">=0.0.0"
    repository: "file://../../../../../02-repos/app-repo/src/orders/chart"
    condition: services.orders.enabled

  - name: catalog
    version: ">=0.0.0"
    repository: "file://../../../../../02-repos/app-repo/src/catalog/chart"
    condition: services.catalog.enabled

  - name: checkout
    version: ">=0.0.0"
    repository: "file://../../../../../02-repos/app-repo/src/checkout/chart"
    condition: services.checkout.enabled
