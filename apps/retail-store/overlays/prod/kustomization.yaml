# Kustomize overlay for production environment

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: retail-store-prod

helmCharts:
  - name: retail-store
    repo: ""
    version: "1.0.0"
    releaseName: retail-store-prod
    namespace: retail-store-prod
    valuesFile: ../../values.yaml
    additionalValuesFiles:
      - ../../overlays/prod/values-prod.yaml
    includeCRDs: true

labels:
  - pairs:
      app.kubernetes.io/managed-by: argocd
      app.kubernetes.io/part-of: retail-store
      environment: prod

images:
  - name: ui
    newName: <ECR_BASE_URL>/uit-devsecops-prod-ui
    newTag: stable
  - name: cart
    newName: <ECR_BASE_URL>/uit-devsecops-prod-cart
    newTag: stable
  - name: orders
    newName: <ECR_BASE_URL>/uit-devsecops-prod-orders
    newTag: stable
  - name: catalog
    newName: <ECR_BASE_URL>/uit-devsecops-prod-catalog
    newTag: stable
  - name: checkout
    newName: <ECR_BASE_URL>/uit-devsecops-prod-checkout
    newTag: stable
