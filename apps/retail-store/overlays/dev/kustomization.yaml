apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: retail-store-dev

resources:
  - ../../base

namePrefix: dev-

patches:
  - target:
      kind: Deployment
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: ENVIRONMENT
          value: dev
